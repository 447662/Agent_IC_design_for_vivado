name: Python quality

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install frozen development dependencies
        run: uv sync --frozen --group dev

      - name: Ruff
        run: uv run --frozen ruff check .trae/agent tests

      - name: Mypy
        run: uv run --frozen mypy

      - name: Verify tracked runtime snapshot
        run: >-
          uv run --frozen pytest tests/test_repository_reproducibility.py
          -q
          --basetemp .tmp-pytest-reproducibility
          -p no:cacheprovider

      - name: Pytest with coverage
        run: >-
          uv run --frozen pytest tests
          --cov=.trae/agent
          --cov-report=term-missing
          --cov-report=xml
          --basetemp .tmp-pytest
