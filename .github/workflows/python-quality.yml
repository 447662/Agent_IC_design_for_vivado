name: Python quality

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          version: "0.11.26"

      - name: Install frozen development dependencies
        run: uv sync --frozen --group dev

      - name: Verify generated agent config mirror
        run: uv run --frozen python scripts/sync_agent_config.py --check

      - name: Verify release source tree
        run: uv run --frozen python scripts/check_release_tree.py --phase source

      - name: Build wheel and sdist
        run: >-
          uv build --wheel --sdist
          --out-dir .tmp/distributions
          --no-create-gitignore

      - name: Smoke test wheel outside source tree
        run: >-
          uv run --frozen python scripts/smoke_test_distribution.py
          --artifact-dir .tmp/distributions
          --kind wheel
          --work-dir .tmp/distribution-smoke-wheel

      - name: Smoke test sdist outside source tree
        run: >-
          uv run --frozen python scripts/smoke_test_distribution.py
          --artifact-dir .tmp/distributions
          --kind sdist
          --work-dir .tmp/distribution-smoke-sdist

      - name: Ruff
        run: uv run --frozen ruff check .trae/agent tests src/digital_ic_agent scripts

      - name: Mypy
        run: uv run --frozen mypy

      - name: Verify release-tree runtime snapshot
        run: >-
          uv run --frozen pytest tests/test_repository_reproducibility.py
          -q
          --basetemp .tmp-pytest-reproducibility
          -p no:cacheprovider

      - name: Pytest with coverage
        run: >-
          uv run --frozen pytest tests
          --junitxml .tmp/pytest-results.xml
          --cov=src/digital_ic_agent
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --basetemp .tmp-pytest
          -p no:cacheprovider

      - name: Generate quality summary
        if: ${{ !cancelled() }}
        run: >-
          uv run --frozen python scripts/generate_quality_summary.py
          --junitxml .tmp/pytest-results.xml
          --coverage-xml coverage.xml
          --minimum-line-rate 0.90
          --minimum-branch-rate 0.80
          --readme README.md
          --output-dir .tmp/generated-quality
          --source ci
          --commit-sha "${{ github.sha }}"
          --run-id "${{ github.run_id }}"
          --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Enforce risk-oriented module coverage
        run: uv run --frozen python scripts/check_risk_coverage.py --coverage-xml coverage.xml

      - name: Generate agent evaluation report
        if: ${{ !cancelled() }}
        run: >-
          uv run --frozen python scripts/generate_agent_eval_report.py
          --eval-cases tests/fixtures/agent_eval_cases.json
          --output-dir .tmp/generated-quality

      - name: Generate test module size report
        if: ${{ !cancelled() }}
        run: >-
          uv run --frozen python scripts/generate_test_module_report.py
          --tests-dir tests
          --line-limit 1000
          --output-dir .tmp/generated-quality

      - name: Verify generated quality reports
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          test -s .tmp/generated-quality/quality_summary.md
          test -s .tmp/generated-quality/capability_matrix.md
          test -s .tmp/generated-quality/quality_provenance.json
          test -s .tmp/generated-quality/agent_eval_report.json
          test -s .tmp/generated-quality/agent_eval_report.md
          test -s .tmp/generated-quality/test_module_report.json
          test -s .tmp/generated-quality/test_module_report.md
          test -s coverage.xml
          test -s .tmp/pytest-results.xml
          uv run --frozen python scripts/check_release_tree.py --phase generated

      - name: Upload generated quality reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: digital-ic-agent-generated-quality-${{ matrix.python-version }}
          path: |
            .tmp/generated-quality
            coverage.xml
            .tmp/pytest-results.xml
          if-no-files-found: error
