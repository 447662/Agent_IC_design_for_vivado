name: Vivado integration

on:
  workflow_dispatch:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize, reopened]
  push:
    branches: [vivado-integration]

permissions:
  contents: read

jobs:
  vivado-integration:
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'vivado-integration')
    runs-on: [self-hosted, Windows, vivado]
    environment: vivado-trusted-runner
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff

      - name: Install frozen development dependencies
        run: uv sync --frozen --group dev

      - name: Run real Vivado integration gate
        shell: powershell
        run: >-
          .github/scripts/run-vivado-integration.ps1
          -ArtifactsRoot "${{ runner.temp }}\vivado-integration"

      - name: Upload Vivado diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: vivado-integration-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}\vivado-integration
          if-no-files-found: error
          retention-days: 14

  vivado-required-gate:
    name: vivado-required-gate
    if: always()
    needs: [vivado-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Enforce deterministic Vivado release result
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HAS_VIVADO_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'vivado-integration') }}
          REAL_GATE_RESULT: ${{ needs.vivado-integration.result }}
        run: |
          if [[ "${EVENT_NAME}" == "pull_request" && "${HAS_VIVADO_LABEL}" != "true" ]]; then
            echo "::error::Missing required pull-request label: vivado-integration"
            exit 1
          fi
          if [[ "${REAL_GATE_RESULT}" != "success" ]]; then
            echo "::error::Real Vivado integration did not pass: ${REAL_GATE_RESULT}"
            exit 1
          fi
          echo "Vivado required gate: PASS"
