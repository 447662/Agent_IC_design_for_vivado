name: Vivado integration

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]
  push:
    branches: [vivado-integration]

permissions:
  contents: read

jobs:
  vivado-integration:
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'vivado-integration')
    runs-on: [self-hosted, Windows, vivado]
    environment: vivado-trusted-runner
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install frozen development dependencies
        run: uv sync --frozen --group dev

      - name: Run real Vivado integration gate
        shell: powershell
        run: >-
          .github/scripts/run-vivado-integration.ps1
          -ArtifactsRoot "${{ runner.temp }}\vivado-integration"

      - name: Upload Vivado diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vivado-integration-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}\vivado-integration
          if-no-files-found: error
          retention-days: 14
