[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"

[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
    "OpenCLI",
    "outputs",
    ".tmp",
    ".tmp-*",
    "VCD_ANALYZER-main",
    "RWaveAnalyzer-main",
    "docs/tools_archive",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]

[tool.ruff.lint.per-file-ignores]
".trae/agent/agent.py" = ["E402", "F401"]

[tool.mypy]
python_version = "3.11"
files = [
    ".trae/agent/agent_runtime.py",
    ".trae/agent/agent_cli.py",
    ".trae/agent/agent_config.py",
    ".trae/agent/agent_reports.py",
    ".trae/agent/agent_waveform.py",
    ".trae/agent/artifact_manifest.py",
    ".trae/agent/history_rotation.py",
    ".trae/agent/coverage_closure.py",
    ".trae/agent/coverage_gates.py",
    ".trae/agent/coverage_history.py",
    ".trae/agent/coverage_recommendations.py",
    ".trae/agent/environment_report.py",
    ".trae/agent/failure_archive.py",
    ".trae/agent/project_overview.py",
    ".trae/agent/wave_visibility.py",
    ".trae/agent/waveform_samples.py",
    ".trae/agent/xcrg_coverage.py",
    ".trae/agent/adapters/report.py",
    ".trae/agent/adapters/vivado.py",
    ".trae/agent/adapters/waveform.py",
    ".trae/agent/target_registry.py",
    ".trae/agent/target_scaffolder.py",
    ".trae/agent/target_checks.py",
    ".trae/agent/target_flows.py",
]
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true
exclude = "(OpenCLI|outputs|VCD_ANALYZER-main|RWaveAnalyzer-main|docs/tools_archive)"

[tool.coverage.run]
branch = true
source = [".trae/agent"]

[tool.coverage.report]
fail_under = 68
show_missing = true
skip_covered = true
precision = 1
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]
